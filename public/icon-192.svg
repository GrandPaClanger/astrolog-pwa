<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0f172a"/>

  <!-- Stars -->
  <circle cx="35" cy="35" r="2.5" fill="#f1f5f9" opacity="0.8"/>
  <circle cx="158" cy="28" r="2" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="168" cy="58" r="2" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="22" cy="72" r="1.5" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="78" cy="24" r="2" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="148" cy="150" r="1.5" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="52" cy="158" r="1.5" fill="#f1f5f9" opacity="0.4"/>

  <!-- Telescope tube (angled -25 degrees, centered at 94, 84) -->
  <g transform="translate(94,84) rotate(-25)">
    <!-- Main tube body -->
    <rect x="-50" y="-12" width="100" height="24" rx="8" fill="#3b82f6"/>
    <!-- Objective lens (wider, left end) -->
    <rect x="-68" y="-16" width="26" height="32" rx="7" fill="#2563eb"/>
    <!-- Eyepiece (right end) -->
    <rect x="50" y="-8" width="20" height="16" rx="5" fill="#1d4ed8"/>
  </g>

  <!-- Tripod base -->
  <line x1="94" y1="110" x2="68" y2="160" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="110" x2="120" y2="160" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="110" x2="94" y2="160" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
</svg>
